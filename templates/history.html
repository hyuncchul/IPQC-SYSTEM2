{% extends "base.html" %}
{% block content %}
<div class="row mb-3">
  <div class="col">
    <h4><i class="bi bi-clock-history"></i> 입력 이력 조회</h4>
  </div>
</div>

{% if dates %}
<div class="card">
  <div class="card-header" style="background:#1F4E79;color:white;">날짜별 조회</div>
  <div class="card-body">
    <div class="row g-2">
      {% for d in dates %}
      <div class="col-md-2 col-4">
        <a href="/view/{{ d }}" class="btn btn-outline-primary w-100">
          <i class="bi bi-calendar3"></i><br>
          <small>{{ d }}</small>
        </a>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
{% else %}
<div class="alert alert-info">아직 입력된 데이터가 없습니다.</div>
{% endif %}
{% endblock %}
